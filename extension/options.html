<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Text Adapter Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>Text Adapter Options</h1>

      <section class="card">
        <div class="row">
          <label>Провайдер</label>
          <div class="field-static">Groq (бесплатный API)</div>
        </div>

        <div class="row">
          <label for="apiKey">API key</label>
          <input id="apiKey" type="password" placeholder="ключ с console.groq.com" />
        </div>

        <div class="actions">
          <button id="save" class="primary">Save</button>
          <button id="test" class="btn">Test connection</button>
        </div>

        <div id="status" class="status" aria-live="polite"></div>
        <div class="note">
          Длинная страница обрабатывается по частям. Для скорости используйте режим <em>Выделение</em>.
        </div>
      </section>
    </main>

    <script src="options.js" type="module"></script>
  </body>
</html>
